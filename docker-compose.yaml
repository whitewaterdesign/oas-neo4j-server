services:
  neo4j:
    image: neo4j:4.4.47
    container_name: neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      # Set auth as neo4j/<password>
      - NEO4J_AUTH=neo4j/password

      # Accept license (required for some editions)
      - NEO4J_ACCEPT_LICENSE_AGREEMENT=yes

      # Optional memory tuning for dev
      - NEO4J_server_memory_pagecache_size=512M
      - NEO4J_server_memory_heap_initial__size=512M
      - NEO4J_server_memory_heap_max__size=512M

      # Allow APOC if you want it later
      - NEO4J_PLUGINS=["apoc"]

    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - neo4j_import:/import
      - neo4j_plugins:/plugins

volumes:
  neo4j_data:
  neo4j_logs:
  neo4j_import:
  neo4j_plugins:
